<!DOCTYPE html>
<html>
<head>
    <title>Smart AI Chatbot</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
        }

        h2 {
            text-align: center;
            padding: 15px;
        }

        #chatbox {
            width: 600px;
            height: 500px;
            margin: auto;
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            overflow-y: auto;
        }

        .msg {
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            max-width: 80%;
        }

        .user {
            background: #38bdf8;
            color: black;
            margin-left: auto;
            text-align: right;
        }

        .bot {
            background: #334155;
            text-align: left;
        }

        .sources {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 5px;
        }

        #inputArea {
            text-align: center;
            margin: 15px;
        }

        input {
            width: 300px;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px;
            background: #38bdf8;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #typing {
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<h2>🚀 Smart RAG Chatbot</h2>

<div style="text-align:center;">
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Upload</button>
</div>

<div id="chatbox"></div>

<div id="typing"></div>

<div id="inputArea">
    <input id="query" placeholder="Ask anything..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>
function uploadFile() {
    let file = document.getElementById("fileInput").files[0];
    let formData = new FormData();
    formData.append("file", file);

    fetch("/upload", { method: "POST", body: formData })
    .then(res => res.json())
    .then(data => alert(data.message));
}

function sendMessage() {
    let query = document.getElementById("query").value;
    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += `<div class="msg user">${query}</div>`;
    document.getElementById("query").value = "";

    document.getElementById("typing").innerText = "Bot is typing...";

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({query: query})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("typing").innerText = "";

        chatbox.innerHTML += `<div class="msg bot">${data.response}</div>`;

        let confidence = (Math.random() * (95 - 75) + 75).toFixed(1);

        chatbox.innerHTML += `<div class="sources">
📊 Confidence: ${confidence}%<br>
📌 Sources:<br>
${data.sources.map(s => "- " + s).join("<br>")}
</div>`;

        chatbox.scrollTop = chatbox.scrollHeight;
    });
}
</script>

</body>
</html>
